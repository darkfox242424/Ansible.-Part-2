---
- name: Задание 1.3 — Изменение motd через переменную
  hosts: all
  become: true
  vars:
    simple_motd: "Добро пожаловать в систему! Работайте аккуратно."
  tasks:
    - name: Записать приветствие в файл /etc/motd
      ansible.builtin.copy:
        content: "{{ simple_motd }}\n"
        dest: "/etc/motd"
        owner: root
        group: root
        mode: '0644'
